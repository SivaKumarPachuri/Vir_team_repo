server:
  port: 9393

spring:
  application:
    name: bms-transaction-service

  datasource:
    url: jdbc:mysql://localhost:3306/bms_transaction_management_service_db
    username: root
    password: siva@9652
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update   # use validate in production
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  security:
    oauth2:
      resourceserver:
        jwt:
          secret-key: ${JWT_SECRET:MPM378geHGPiW5UIWqrTNgUZtYXYIMOYqAaGb4abRo8=}

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka/

  instance:
    prefer-ip-address: true


resilience4j:

  circuitbreaker:
    instances:
      accountService:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3

  retry:
    instances:
      accountService:
        maxAttempts: 3
        waitDuration: 2s

  bulkhead:
    instances:
      accountService:
        maxConcurrentCalls: 10
        maxWaitDuration: 5s

  timelimiter:
    instances:
      accountService:
        timeoutDuration: 3s


logging:
  level:
    org.springframework.security: DEBUG
    io.github.resilience4j: DEBUG
