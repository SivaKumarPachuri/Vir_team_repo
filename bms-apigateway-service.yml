server:
  port: 8085

jwt:
  secret: ${JWT_SECRET:MPM378geHGPiW5UIWqrTNgUZtYXYIMOYqAaGb4abRo8=}

spring:
  cloud:
    gateway:
      routes:
        - id: bms-authuser-service
          uri: lb://BMS-AUTHUSER-SERVICE
          predicates:
            - Path=/bms/auth/**
          filters:
            - JwtAuthenticationFilter

        - id: account-service
          uri: lb://ACCOUNT-MANAGEMENT-SERVICE
          predicates:
            - Path=/accounts/v1/**
          filters:
            - JwtAuthenticationFilter

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
